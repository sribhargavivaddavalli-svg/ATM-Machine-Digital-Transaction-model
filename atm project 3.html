<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ATM System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
background:#0f2027;
color:white;
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
padding:20px 0;
overflow-y:auto;
}

.page{
display:none;
width:95%;
max-width:900px;
background:#1f3b46;
padding:25px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
background:#ff512f;
color:white;
font-weight:bold;
cursor:pointer;
}

.back-btn{
background:#555;
}
</style>
</head>

<body>

<!-- MOBILE NUMBER PAGE -->
<div id="mobilePage" class="page" style="display:block;">
<h2>Enter Mobile Number</h2>
<input type="text" id="mobileInput" placeholder="Enter Mobile Number">
<button onclick="sendOTP()">Send OTP</button>
<p id="mobileMsg" style="color:red;"></p>
</div>

<!-- OTP PAGE -->
<div id="otpPage" class="page">
<h2>Enter OTP</h2>
<input type="text" id="otpInput" placeholder="Enter OTP">
<button onclick="verifyOTP()">Verify OTP</button>
<p id="otpMsg" style="color:red;"></p>
</div>

<!-- PIN PAGE -->
<div id="loginPage" class="page">
<h2>ATM Login</h2>
<input type="password" id="pinInput" placeholder="Enter PIN">
<button onclick="login()">Login</button>
<p id="loginMsg" style="color:red;"></p>
</div>

<!-- HOME PAGE -->
<div id="homePage" class="page">
<h2 id="welcomeText"></h2>
<h3>Balance: ₹ <span id="bal"></span></h3>
<h3>Daily Limit Left: ₹ <span id="limit"></span></h3>

<button onclick="openPage('depositPage')">Deposit</button>
<button onclick="openPage('withdrawPage')">Withdraw</button>
<button onclick="openPage('internalTransferPage')">Internal Transfer</button>
<button onclick="openPage('externalTransferPage')">External Transfer</button>
<button onclick="openPage('historyPage')">Full History</button>
<button onclick="openPage('lastFivePage')">Last 5 Transactions</button>
<button onclick="openPage('pinChangePage')">Change PIN</button>
<button onclick="openPage('qrPage')">Generate QR</button>
<button onclick="openPage('pdfPage')">PDF Download</button>
<button onclick="logout()">Logout</button>
</div>

<!-- DEPOSIT -->
<div id="depositPage" class="page">
<h2>Deposit</h2>
<input type="number" id="depAmt" placeholder="Enter Amount">
<button onclick="deposit()">Submit</button>
<button class="back-btn" onclick="openPage('homePage')">Back</button>
</div>

<!-- WITHDRAW -->
<div id="withdrawPage" class="page">
<h2>Withdraw</h2>
<input type="number" id="wdAmt" placeholder="Enter Amount">
<button onclick="withdrawAmt()">Submit</button>
<button class="back-btn" onclick="openPage('homePage')">Back</button>
</div>

<!-- INTERNAL TRANSFER -->
<div id="internalTransferPage" class="page">
<h2>Internal Transfer</h2>
<input type="number" id="intAmt" placeholder="Enter Amount">
<input type="text" id="intPin" placeholder="Receiver PIN">
<button onclick="internalTransfer()">Transfer</button>
<button class="back-btn" onclick="openPage('homePage')">Back</button>
</div>

<!-- EXTERNAL TRANSFER -->
<div id="externalTransferPage" class="page">
<h2>External Transfer</h2>
<input type="number" id="extAmt" placeholder="Enter Amount">
<input type="text" id="extBank" placeholder="Bank Name">
<button onclick="externalTransfer()">Send</button>
<button class="back-btn" onclick="openPage('homePage')">Back</button>
</div>

<!-- FULL HISTORY -->
<div id="historyPage" class="page">
<h2>Full History</h2>
<div id="historyList"></div>
<button class="back-btn" onclick="openPage('homePage')">Back</button>
</div>

<!-- LAST 5 -->
<div id="lastFivePage" class="page">
<h2>Last 5</h2>
<div id="lastFiveList"></div>
<button class="back-btn" onclick="openPage('homePage')">Back</button>
</div>

<!-- CHANGE PIN -->
<div id="pinChangePage" class="page">
<h2>Change PIN</h2>
<input type="password" id="newPIN" placeholder="Enter new PIN">
<button onclick="changePIN()">Change</button>
<button class="back-btn" onclick="openPage('homePage')">Back</button>
</div>

<!-- QR -->
<div id="qrPage" class="page">
<h2>Your QR Code</h2>
<div id="qrBox"></div>
<button class="back-btn" onclick="openPage('homePage')">Back</button>
</div>

<!-- PDF PAGE -->
<div id="pdfPage" class="page">
<h2>Download Account PDF</h2>
<button onclick="downloadPDF()">Download PDF</button>
<button class="back-btn" onclick="openPage('homePage')">Back</button>
</div>

<script>

let accounts = {
"4829": { bank:"SBI Bank", balance:10000, limit:10000, history:[] },
"9173": { bank:"HDFC Bank", balance:15000, limit:10000, history:[] },
"3508": { bank:"ICICI Bank", balance:20000, limit:10000, history:[] },
"7641": { bank:"Axis Bank", balance:25000, limit:10000, history:[] },
"5294": { bank:"PNB Bank", balance:12000, limit:10000, history:[] }
};

let current = null;
let generatedOTP = "";

function openPage(id){
document.querySelectorAll('.page').forEach(p=>p.style.display="none");
document.getElementById(id).style.display="block";

if(id==="qrPage") generateQR();
if(id==="historyPage") loadHistory();
if(id==="lastFivePage") loadLastFive();
}

function sendOTP(){
let mobile=document.getElementById("mobileInput").value;
if(mobile.length!==10||isNaN(mobile)){
document.getElementById("mobileMsg").innerText="Enter valid 10 digit number!";
return;
}
generatedOTP=Math.floor(1000+Math.random()*9000);
alert("Your OTP is: "+generatedOTP);
openPage("otpPage");
}

function verifyOTP(){
let entered=document.getElementById("otpInput").value;
if(entered==generatedOTP){
openPage("loginPage");
}else{
document.getElementById("otpMsg").innerText="Invalid OTP!";
}
}

function login(){
let pin=document.getElementById("pinInput").value;
if(!accounts[pin]){
document.getElementById("loginMsg").innerText="Invalid PIN!";
return;
}
current=accounts[pin];
document.getElementById("welcomeText").innerText="Welcome to "+current.bank;
document.getElementById("bal").innerText=current.balance;
document.getElementById("limit").innerText=current.limit;
openPage("homePage");
}

function deposit(){
let amt=parseInt(document.getElementById("depAmt").value);
if(amt>0){
current.balance+=amt;
current.history.push("Deposit ₹"+amt);
document.getElementById("bal").innerText=current.balance;
}
openPage("homePage");
}

function withdrawAmt(){
let amt=parseInt(document.getElementById("wdAmt").value);
if(amt>0&&amt<=current.balance){
if(amt>current.limit){alert("Limit exceeded");return;}
current.balance-=amt;
current.limit-=amt;
current.history.push("Withdraw ₹"+amt);
document.getElementById("bal").innerText=current.balance;
document.getElementById("limit").innerText=current.limit;
}
openPage("homePage");
}

function internalTransfer(){
let amt=parseInt(document.getElementById("intAmt").value);
let pin=document.getElementById("intPin").value;
if(accounts[pin]&&amt>0&&amt<=current.balance){
current.balance-=amt;
accounts[pin].balance+=amt;
current.history.push("Internal Transfer ₹"+amt);
}
openPage("homePage");
}

function externalTransfer(){
let amt=parseInt(document.getElementById("extAmt").value);
let bank=document.getElementById("extBank").value;
if(amt>0&&amt<=current.balance){
current.balance-=amt;
current.history.push("External Transfer to "+bank+" ₹"+amt);
}
openPage("homePage");
}

function loadHistory(){
document.getElementById("historyList").innerHTML=
current.history.map(x=>`<p>${x}</p>`).join('');
}

function loadLastFive(){
let last=current.history.slice(-5);
document.getElementById("lastFiveList").innerHTML=
last.map(x=>`<p>${x}</p>`).join('');
}

function changePIN(){
let np=document.getElementById("newPIN").value;
if(!np||accounts[np]){alert("Invalid/New PIN Exists");return;}
accounts[np]=current;
delete accounts[Object.keys(accounts).find(k=>accounts[k]===current)];
current.history.push("PIN Changed");
alert("PIN Updated!");
openPage("homePage");
}

function generateQR(){
document.getElementById("qrBox").innerHTML="";
new QRCode(document.getElementById("qrBox"),JSON.stringify(current));
}

function logout(){
current=null;
document.getElementById("pinInput").value="";
openPage("mobilePage");
}

function downloadPDF(){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();

doc.setFontSize(18);
doc.text("ATM Account Statement",20,20);

doc.setFontSize(12);
doc.text("Bank: "+current.bank,20,40);
doc.text("Balance: ₹ "+current.balance,20,50);
doc.text("Daily Limit Left: ₹ "+current.limit,20,60);

doc.text("Transaction History:",20,80);

let y=90;

if(current.history.length===0){
doc.text("No transactions available.",20,y);
}else{
current.history.forEach((item,index)=>{
doc.text((index+1)+". "+item,20,y);
y+=10;
});
}

doc.save("ATM_Statement.pdf");
}

</script>
</body>
</html>
